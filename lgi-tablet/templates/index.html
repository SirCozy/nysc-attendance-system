<!DOCTYPE html>
<html>
<head>
<title>NYSC Attendance</title>

<style>
body{
font-family: Arial;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:10px;
padding:20px;
}

.box{
padding:30px;
font-size:20px;
background:#eee;
cursor:pointer;
border-radius:8px;
text-align:center;
}

.marked{
background:green;
color:white;
}
</style>

</head>

<body>

<h2>NYSC Attendance Grid</h2>

<input id="search" placeholder="Enter number..." style="padding:10px;font-size:18px;width:200px">
<button onclick="findNumber()">Find</button>
<div class="grid">

{% for i in numbers %}

<div class="box {% if i in marked %}marked{% endif %}" onclick="mark({{i}},this)">
{{i}}
</div>

{% endfor %}

</div>

<script>

function mark(num,el){

fetch("/mark",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({number:num})
})

.then(()=>{
el.classList.add("marked")
})

}

function findNumber(){

let num = document.getElementById("search").value

let boxes = document.querySelectorAll(".box")

boxes.forEach(box=>{
box.style.border=""
})

boxes.forEach(box=>{
if(box.innerText == num){
box.scrollIntoView({behavior:"smooth",block:"center"})
box.style.border="4px solid red"
}
})

}

setInterval(()=>{
location.reload()
},5000)

</script>

</body>
</html>
